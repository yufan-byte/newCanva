<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号管理</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.06.17.1781693043"></script>
    <script src="/static/vendor/js/lucide.js?v=2026.06.17.1781693043"></script>
    <script src="/static/js/theme.js?v=2026.06.17.1781693043"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --border: #d2d2d7;
            --input-bg: #f5f5f7;
            --input-focus: #e8e8ed;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --danger: #ff3b30;
            --danger-hover: #ff453a;
            --danger-bg: #fff2f1;
            --success: #34c759;
            --success-bg: #f0faf3;
        }
        html.theme-dark, html.studio-theme-dark {
            --bg: #1c1c1e;
            --card-bg: #2c2c2e;
            --text: #f5f5f7;
            --text-secondary: #98989d;
            --border: #3a3a3c;
            --input-bg: #1c1c1e;
            --input-focus: #3a3a3c;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --danger: #ff453a;
            --danger-hover: #ff6961;
            --danger-bg: #3c1c1c;
            --success: #30d158;
            --success-bg: #1c2c1c;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .page { padding: 32px 40px; max-width: 800px; margin: 0 auto; }
        .page-head { margin-bottom: 28px; }
        .page-head .title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .page-head .subtitle { font-size: 14px; color: var(--text-secondary); }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
            transition: background 0.3s, border-color 0.3s;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Table */
        .user-table { width: 100%; border-collapse: collapse; }
        .user-table th {
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        .user-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            vertical-align: middle;
        }
        .user-table tr:last-child td { border-bottom: none; }
        .user-table tr:hover td { background: var(--input-bg); }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-admin { background: var(--accent); color: #fff; }
        .badge-user { background: var(--input-bg); color: var(--text-secondary); border: 1px solid var(--border); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger-bg); }
        .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-sm { padding: 5px 12px; font-size: 13px; }
        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 8px;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-icon:hover { border-color: var(--danger); color: var(--danger); }

        .input-field {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            color: var(--text);
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s, background 0.2s;
        }
        .input-field:focus { border-color: var(--accent); background: var(--input-focus); }
        .input-field::placeholder { color: var(--text-secondary); }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 380px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
        .toast-error { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }

        .empty-state {
            text-align: center;
            padding: 32px 0;
            color: var(--text-secondary);
        }
        .empty-state i { margin-bottom: 8px; }

        .loading { text-align: center; padding: 40px 0; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="page">
        <header class="page-head">
            <div class="title">账号管理</div>
            <div class="subtitle">管理系统用户，添加或移除账号</div>
        </header>

        <!-- User list card -->
        <div class="card">
            <div class="card-title">
                <i data-lucide="users" class="w-5 h-5"></i>
                用户列表
                <div style="flex:1"></div>
                <button class="btn btn-primary btn-sm" onclick="showAddModal()">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    添加用户
                </button>
            </div>
            <div id="user-list">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- Current user info -->
        <div class="card" style="opacity:0.7">
            <div class="card-title">
                <i data-lucide="shield-check" class="w-5 h-5"></i>
                当前登录
            </div>
            <div id="current-user-info" style="font-size:14px; color:var(--text-secondary)">加载中...</div>
        </div>
    </div>

    <!-- Add user modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal-box">
            <div class="modal-title">添加用户</div>
            <div style="display:flex; flex-direction:column; gap:12px;">
                <div>
                    <label style="font-size:13px; color:var(--text-secondary); margin-bottom:4px; display:block;">用户名</label>
                    <input type="text" id="new-username" class="input-field" placeholder="2-32 个字符" autocomplete="off">
                </div>
                <div>
                    <label style="font-size:13px; color:var(--text-secondary); margin-bottom:4px; display:block;">密码</label>
                    <input type="password" id="new-password" class="input-field" placeholder="至少 6 个字符" autocomplete="new-password">
                </div>
                <div id="add-error" style="color:var(--danger); font-size:13px; display:none;"></div>
            </div>
            <div class="modal-actions">
                <button class="btn" style="background:var(--input-bg); color:var(--text)" onclick="hideAddModal()">取消</button>
                <button class="btn btn-primary" id="add-btn" onclick="addUser()">确认添加</button>
            </div>
        </div>
    </div>

    <!-- Delete confirm modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal-box">
            <div class="modal-title">确认删除</div>
            <p style="font-size:14px; color:var(--text-secondary); margin:0 0 8px;">
                确定要删除用户 <strong id="delete-username" style="color:var(--text)"></strong> 吗？
            </p>
            <p style="font-size:13px; color:var(--danger); margin:0;">此操作不可撤销。</p>
            <div class="modal-actions">
                <button class="btn" style="background:var(--input-bg); color:var(--text)" onclick="hideDeleteModal()">取消</button>
                <button class="btn btn-danger" id="delete-confirm-btn" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        var currentUser = null;
        var users = [];
        var deleteTarget = null;

        // --- Toast ---
        function showToast(msg, type) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast toast-' + (type || 'success') + ' show';
            clearTimeout(el._timer);
            el._timer = setTimeout(function() { el.classList.remove('show'); }, 3000);
        }

        // --- Modal ---
        function showAddModal() {
            document.getElementById('add-modal').classList.add('show');
            document.getElementById('new-username').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('add-error').style.display = 'none';
            document.getElementById('new-username').focus();
        }
        function hideAddModal() {
            document.getElementById('add-modal').classList.remove('show');
        }
        function showDeleteModal(username) {
            deleteTarget = username;
            document.getElementById('delete-username').textContent = username;
            document.getElementById('delete-modal').classList.add('show');
        }
        function hideDeleteModal() {
            document.getElementById('delete-modal').classList.remove('show');
            deleteTarget = null;
        }

        // --- API ---
        async function loadCurrentUser() {
            try {
                var res = await fetch('/api/auth/me');
                if (res.ok) {
                    currentUser = await res.json();
                    document.getElementById('current-user-info').innerHTML =
                        '已登录为 <strong>' + escHtml(currentUser.username) + '</strong>' +
                        ' <span class="badge badge-' + currentUser.role + '">' + currentUser.role + '</span>';
                } else {
                    document.getElementById('current-user-info').textContent = '未认证';
                }
            } catch(e) {
                document.getElementById('current-user-info').textContent = '加载失败';
            }
        }

        async function loadUsers() {
            try {
                var res = await fetch('/api/auth/users');
                if (!res.ok) {
                    var data = await res.json().catch(function(){ return {}; });
                    document.getElementById('user-list').innerHTML =
                        '<div class="empty-state">' + escHtml(data.detail || '加载失败') + '</div>';
                    return;
                }
                users = await res.json();
                renderUsers();
            } catch(e) {
                document.getElementById('user-list').innerHTML =
                    '<div class="empty-state">网络错误</div>';
            }
        }

        function renderUsers() {
            var container = document.getElementById('user-list');
            if (!users.length) {
                container.innerHTML = '<div class="empty-state"><i data-lucide="user-x" class="w-8 h-8"></i><br>暂无用户</div>';
                lucide.createIcons({ attrs: { class: ['w-4', 'h-4'] } });
                return;
            }
            var html = '<table class="user-table"><thead><tr>' +
                '<th>用户名</th><th>角色</th><th>创建时间</th><th style="width:60px"></th>' +
                '</tr></thead><tbody>';
            for (var i = 0; i < users.length; i++) {
                var u = users[i];
                var isSelf = currentUser && u.username === currentUser.username;
                var dateStr = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '-';
                html += '<tr>' +
                    '<td><strong>' + escHtml(u.username) + '</strong>' + (isSelf ? ' <span style="color:var(--text-secondary);font-size:12px">(当前)</span>' : '') + '</td>' +
                    '<td><span class="badge badge-' + u.role + '">' + u.role + '</span></td>' +
                    '<td style="color:var(--text-secondary);font-size:13px">' + dateStr + '</td>' +
                    '<td>' + (isSelf ? '' : '<button class="btn-icon" onclick="showDeleteModal(\'' + escHtml(u.username) + '\')" title="删除用户"><i data-lucide="trash-2" class="w-4 h-4"></i></button>') +
                    '</td></tr>';
            }
            html += '</tbody></table>';
            container.innerHTML = html;
            lucide.createIcons({ attrs: { class: ['w-4', 'h-4'] } });
        }

        async function addUser() {
            var username = document.getElementById('new-username').value.trim();
            var password = document.getElementById('new-password').value;
            var errEl = document.getElementById('add-error');
            errEl.style.display = 'none';

            if (!username || username.length < 2) {
                errEl.textContent = '用户名至少 2 个字符';
                errEl.style.display = 'block';
                return;
            }
            if (!password || password.length < 6) {
                errEl.textContent = '密码至少 6 个字符';
                errEl.style.display = 'block';
                return;
            }

            var btn = document.getElementById('add-btn');
            btn.disabled = true;
            btn.textContent = '添加中...';

            try {
                var res = await fetch('/api/auth/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password }),
                });
                if (res.ok) {
                    hideAddModal();
                    showToast('用户 "' + username + '" 已添加', 'success');
                    loadUsers();
                } else {
                    var data = await res.json().catch(function() { return {}; });
                    errEl.textContent = data.detail || '添加失败';
                    errEl.style.display = 'block';
                }
            } catch(e) {
                errEl.textContent = '网络错误';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '确认添加';
            }
        }

        async function confirmDelete() {
            if (!deleteTarget) return;
            var btn = document.getElementById('delete-confirm-btn');
            btn.disabled = true;
            btn.textContent = '删除中...';

            try {
                var res = await fetch('/api/auth/users/' + encodeURIComponent(deleteTarget), { method: 'DELETE' });
                if (res.ok) {
                    hideDeleteModal();
                    showToast('用户 "' + deleteTarget + '" 已删除', 'success');
                    loadUsers();
                } else {
                    var data = await res.json().catch(function() { return {}; });
                    showToast(data.detail || '删除失败', 'error');
                    hideDeleteModal();
                }
            } catch(e) {
                showToast('网络错误', 'error');
                hideDeleteModal();
            } finally {
                btn.disabled = false;
                btn.textContent = '确认删除';
            }
        }

        function escHtml(s) {
            var div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        // Close modals on overlay click
        document.getElementById('add-modal').addEventListener('click', function(e) {
            if (e.target === this) hideAddModal();
        });
        document.getElementById('delete-modal').addEventListener('click', function(e) {
            if (e.target === this) hideDeleteModal();
        });

        // Keyboard
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                hideAddModal();
                hideDeleteModal();
            }
        });
        document.getElementById('new-password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addUser();
        });

        // Init
        document.addEventListener('DOMContentLoaded', async function() {
            lucide.createIcons();
            await loadCurrentUser();
            await loadUsers();
        });
    </script>
</body>
</html>
